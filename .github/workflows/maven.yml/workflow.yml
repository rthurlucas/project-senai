name: workflow.yml
on:
  push:
    branches: ["dev"]
    pull_request:
      branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '21'
      distribution: 'temurin'
      cache: maven
    -name: Build with Maven
    run: mvn -B package --file pom.xml