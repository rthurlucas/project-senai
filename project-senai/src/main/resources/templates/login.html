<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cantina SENAI</title>
    <link rel="stylesheet" th:href="@{/login.css}">
</head>
<body>

<div class="screen">
    <div class="card">

        <div class="logo-area">
            <div class="senai-badge">
                <div class="senai-block">SENAI</div>
                <div class="senai-divider"></div>
                <div class="senai-sub">
                    <div class="line1">Sistema</div>
                    <div class="line2">Cantina SENAI</div>
                </div>
            </div>
            <p>Faça login para continuar</p>
        </div>

        <p class="profile-label">Entrar como</p>
        <div class="profile-grid">

            <button type="button" class="profile-btn selected"
                    onclick="selecionarPerfil(this, 'USUARIO')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3L2 8l10 5 10-5-10-5z"/>
                    <path d="M2 8v6c0 0 3 3 10 3s10-3 10-3V8"/>
                </svg>
                <span class="label">Usuário</span>
                <span class="sub">Aluno</span>
            </button>

            <button type="button" class="profile-btn"
                    onclick="selecionarPerfil(this, 'FUNCIONARIO')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="7" r="3"/>
                    <path d="M5 21v-2a7 7 0 0 1 14 0v2"/>
                    <path d="M9 13h6"/>
                </svg>
                <span class="label">Funcionário</span>
                <span class="sub">Atendente</span>
            </button>

            <button type="button" class="profile-btn"
                    onclick="selecionarPerfil(this, 'ADMIN')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="15" r="4"/>
                    <path d="M11.5 11.5L20 3"/>
                    <path d="M17 6l1.5 1.5"/>
                    <path d="M19 4l1.5 1.5"/>
                </svg>
                <span class="label">Admin</span>
                <span class="sub">Gerente</span>
            </button>

        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" id="perfil" name="perfil" value="USUARIO" />

            <div class="form-group">
                <label>E-mail ou matrícula</label>
                <input type="text" name="email" placeholder="seu@email.com" required />
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="••••••••" required />
            </div>

            <p th:if="${erro != null}" class="erro-msg" th:text="${erro}"></p>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <p class="forgot"><a href="#">Esqueci minha senha</a></p>
        <div class="footer-bar"></div>
    </div>
</div>

<script>
    function selecionarPerfil(el, valor) {
        document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('perfil').value = valor;
    }
</script>
</body>
</html>
